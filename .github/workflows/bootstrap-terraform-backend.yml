name: bootstrap-terraform-backend

on:
  workflow_dispatch:
    inputs:
      region:
        description: AWS region for backend resources
        required: true
        default: us-east-1
        type: string
      state_bucket:
        description: S3 bucket name for Terraform state
        required: true
        type: string
      lock_table:
        description: DynamoDB table name for Terraform state locking
        required: true
        type: string
      state_key_prefix:
        description: Optional state key prefix hint (informational)
        required: false
        default: depth-yolo-phase1
        type: string
      enable_versioning:
        description: Enable S3 bucket versioning
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      enforce_sse:
        description: Enforce default S3 encryption (AES256)
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      block_public_access:
        description: Enable S3 Public Access Block settings
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  id-token: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.region }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Verify AWS caller identity
        run: aws sts get-caller-identity

      - name: Validate input values
        run: |
          set -euo pipefail
          case "${{ inputs.state_bucket }}" in
            true|false|"" )
              echo "state_bucket must be a real bucket name, not boolean-like values."
              exit 1
              ;;
          esac
          case "${{ inputs.lock_table }}" in
            true|false|"" )
              echo "lock_table must be a real table name, not boolean-like values."
              exit 1
              ;;
          esac

      - name: Create or reuse S3 state bucket
        id: s3
        run: |
          set -euo pipefail
          BUCKET="${{ inputs.state_bucket }}"
          REGION="${{ inputs.region }}"

          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "bucket_status=existing" >> "$GITHUB_OUTPUT"
          else
            if [ "$REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET"
            else
              aws s3api create-bucket \
                --bucket "$BUCKET" \
                --create-bucket-configuration LocationConstraint="$REGION"
            fi
            echo "bucket_status=created" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure S3 bucket protections
        run: |
          set -euo pipefail
          BUCKET="${{ inputs.state_bucket }}"

          if [ "${{ inputs.enable_versioning }}" = "true" ]; then
            aws s3api put-bucket-versioning \
              --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
          fi

          if [ "${{ inputs.enforce_sse }}" = "true" ]; then
            aws s3api put-bucket-encryption \
              --bucket "$BUCKET" \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          fi

          if [ "${{ inputs.block_public_access }}" = "true" ]; then
            aws s3api put-public-access-block \
              --bucket "$BUCKET" \
              --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
          fi

      - name: Create or reuse DynamoDB lock table
        id: ddb
        run: |
          set -euo pipefail
          TABLE="${{ inputs.lock_table }}"
          REGION="${{ inputs.region }}"

          if aws dynamodb describe-table --table-name "$TABLE" --region "$REGION" >/dev/null 2>&1; then
            echo "table_status=existing" >> "$GITHUB_OUTPUT"
          else
            aws dynamodb create-table \
              --table-name "$TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$REGION"
            aws dynamodb wait table-exists --table-name "$TABLE" --region "$REGION"
            echo "table_status=created" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish backend bootstrap summary
        run: |
          {
            echo "## Terraform Backend Bootstrap"
            echo "- region: ${{ inputs.region }}"
            echo "- state_bucket: ${{ inputs.state_bucket }}"
            echo "- lock_table: ${{ inputs.lock_table }}"
            echo "- state_key_prefix: ${{ inputs.state_key_prefix }}"
            echo "- bucket_status: ${{ steps.s3.outputs.bucket_status }}"
            echo "- table_status: ${{ steps.ddb.outputs.table_status }}"
            echo ""
            echo "Next step: set repository secrets"
            echo "- TF_STATE_BUCKET=${{ inputs.state_bucket }}"
            echo "- TF_LOCK_TABLE=${{ inputs.lock_table }}"
            echo "- Optional TF_STATE_KEY=${{ inputs.state_key_prefix }}/${{ inputs.region }}/terraform.tfstate"
          } >> "$GITHUB_STEP_SUMMARY"
