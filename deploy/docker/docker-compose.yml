services:
  signaling:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.signaling
    network_mode: host
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
    command: ["python3", "-m", "services.signaling_self_hosted.server"]

  triton:
    image: ${TRITON_IMAGE:-nvcr.io/nvidia/tritonserver:25.03-py3}
    network_mode: host
    restart: unless-stopped
    gpus: all
    shm_size: "1gb"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    command:
      - tritonserver
      - --model-repository=/models
      - --strict-model-config=false
      - --exit-on-error=false
      - --log-verbose=0
    volumes:
      - ../../triton/model_repository:/models:ro

  edge_gateway:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.edge_gateway
    network_mode: host
    restart: unless-stopped
    depends_on:
      - triton
      - signaling
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ../../configs:/app/configs:ro
      - ../../logs:/app/logs
    command:
      - python3
      - -m
      - services.edge_gateway.app
      - --config
      - configs/edge_gateway.vast_ai.yaml
